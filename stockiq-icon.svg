<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0f0f0f"/>
  
  <!-- Chart bars -->
  <rect x="200" y="600" width="80" height="200" fill="#007bff" rx="8"/>
  <rect x="320" y="500" width="80" height="300" fill="#22c55e" rx="8"/>
  <rect x="440" y="400" width="80" height="400" fill="#007bff" rx="8"/>
  <rect x="560" y="350" width="80" height="450" fill="#22c55e" rx="8"/>
  <rect x="680" y="300" width="80" height="500" fill="#007bff" rx="8"/>
  
  <!-- StockIQ text -->
  <text x="512" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="#ffffff">StockIQ</text>
  
  <!-- Subtle grid lines -->
  <line x1="150" y1="250" x2="850" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="350" x2="850" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="450" x2="850" y2="450" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="550" x2="850" y2="550" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="650" x2="850" y2="650" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="750" x2="850" y2="750" stroke="#333" stroke-width="2"/>
</svg>